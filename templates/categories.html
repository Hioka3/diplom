{% extends 'base.html' %}
{% block content %}
<section class="admin-layout">
  <form class="form-card compact" method="post"><h1>Новая категория</h1><label>Название<input name="name" required></label><label>Описание<textarea name="description" rows="4"></textarea></label><button class="btn primary" type="submit">Добавить</button></form>
  <div class="table-card"><h1>Управление категориями</h1><table><tr><th>ID</th><th>Название</th><th>Описание</th></tr>{% for c in categories %}<tr><td>{{ c.id }}</td><td>{{ c.name }}</td><td>{{ c.description }}</td></tr>{% endfor %}</table></div>
</section>
{% endblock %}
